<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes del sistema</title>

  <!-- Bootstrap 4.6 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body { background:#f5f5f3; font-family:'Segoe UI'; }
    .stat-value { font-size:22px; font-weight:600; }
    .stat-label { font-size:12px; color:#6c757d; }

    .badge-custom { font-size:11px; padding:4px 8px; border-radius:5px; }
    .badge-completado { background:#d4edda; color:#155724; }
    .badge-progreso { background:#d1ecf1; color:#0c5460; }
    .badge-pendiente { background:#fff3cd; color:#856404; }
    .badge-cancelado { background:#f8d7da; color:#721c24; }

    .progress { height:6px; }

    .toast { position:fixed; bottom:20px; right:20px; }
  </style>
</head>

<body>

<div class="container mt-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
    <h5 class="mb-0">Reportes del sistema</h5>
    <div>
      <button class="btn btn-outline-secondary btn-sm" onclick="resetFiltros()">Limpiar</button>
      <button class="btn btn-outline-primary btn-sm" onclick="aplicarFiltros()">Filtrar</button>
    </div>
  </div>

  <!-- FECHAS -->
  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <h6>Filtros de fecha</h6>
      <div class="row">
        <div class="col-md-6 mb-2">
          <input type="date" class="form-control" id="fecha-desde">
        </div>
        <div class="col-md-6 mb-2">
          <input type="date" class="form-control" id="fecha-hasta">
        </div>
      </div>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <div class="row">
        <div class="col-md-4 mb-2">
          <select class="form-control" id="filtro-tecnico">
            <option value="">Técnico</option>
            <option>Carlos</option>
            <option>Ana</option>
          </select>
        </div>
        <div class="col-md-4 mb-2">
          <select class="form-control" id="filtro-depto">
            <option value="">Departamento</option>
            <option>San Salvador</option>
            <option>Santa Ana</option>
          </select>
        </div>
        <div class="col-md-4 mb-2">
          <select class="form-control" id="filtro-estado">
            <option value="">Estado</option>
            <option>Completado</option>
            <option>Pendiente</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- METRICAS -->
  <div class="row mb-3">
    <div class="col-md-3 col-6"><div class="card p-2"><div class="stat-label">Total</div><div id="s-total" class="stat-value"></div></div></div>
    <div class="col-md-3 col-6"><div class="card p-2"><div class="stat-label">Completados</div><div id="s-comp" class="stat-value"></div></div></div>
    <div class="col-md-3 col-6"><div class="card p-2"><div class="stat-label">Pendientes</div><div id="s-pend" class="stat-value"></div></div></div>
    <div class="col-md-3 col-6"><div class="card p-2"><div class="stat-label">Cancelados</div><div id="s-canc" class="stat-value"></div></div></div>
  </div>

  <!-- TABLA -->
  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-sm table-hover">
          <thead>
            <tr>
              <th>#</th><th>Técnico</th><th>Depto</th><th>Fecha</th><th>Estado</th><th>Avance</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- EXPORT -->
  <div class="d-flex justify-content-between mt-3">
    <select id="fmt-export" class="form-control w-auto">
      <option>PDF</option><option>Excel</option>
    </select>
    <button class="btn btn-primary" onclick="exportarReporte()">Exportar</button>
  </div>

</div>

<!-- Toast -->
<div class="toast" data-delay="3000">
  <div class="toast-body bg-primary text-white">
    Reporte generado
  </div>
</div>

<!-- TU JS -->
<script src="reportes.js"></script>

</body>
</html>
