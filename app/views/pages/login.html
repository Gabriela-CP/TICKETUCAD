<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Inicio de Sesión | Ticket UCAD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            background: #0a0f1e;
            overflow: hidden;
        }

        /* ── FONDO ANIMADO ── */
        .bg-animated {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #0d2a6e22 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, #1a4fa822 0%, transparent 55%),
                        radial-gradient(ellipse at 60% 80%, #0b3d9122 0%, transparent 50%),
                        #0a0f1e;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: float 8s ease-in-out infinite;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #1e5fd4, #0a2a7a);
            top: -150px; left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #0e3fa8, #071e5c);
            bottom: -100px; right: 30%;
            animation-delay: 3s;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #2563eb, #1040a0);
            top: 40%; right: -80px;
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50%       { transform: translateY(-30px) scale(1.05); }
        }

        /* ── GRID PRINCIPAL ── */
        .layout {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 420px;
            width: 100%;
            min-height: 100vh;
        }

        /* ── PANEL IZQUIERDO (info) ── */
        .panel-info {
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Sección superior: logo + texto */
        .panel-top {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 60px 32px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 44px;
        }

        .brand-logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(77,159,255,0.45));
            flex-shrink: 0;
        }

        .brand-text .brand-name {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .brand-text .brand-sub {
            font-size: 12px;
            color: #4d7aaa;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .info-headline {
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            line-height: 1.18;
            margin-bottom: 16px;
        }

        .info-headline span {
            background: linear-gradient(90deg, #4d9fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info-sub {
            font-size: 14px;
            color: #5a7a9a;
            line-height: 1.75;
            max-width: 380px;
            margin-bottom: 36px;
        }

        .stats-row {
            display: flex;
            gap: 28px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-num {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            font-size: 11px;
            color: #3a5a7a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-divider {
            width: 1px;
            background: #1a2d4a;
            align-self: stretch;
        }

        /* Video panorámico en la parte inferior */
        .video-banner {
            height: 220px;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }

        .video-banner video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                #0a0f1e 0%,
                rgba(10,15,30,0.5) 30%,
                rgba(10,15,30,0.2) 60%,
                rgba(10,15,30,0.6) 100%
            );
        }

        .video-banner-label {
            position: absolute;
            bottom: 20px;
            left: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .video-banner-label .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4d9fff;
            box-shadow: 0 0 8px #4d9fff;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(1.3); }
        }

        .video-banner-label span {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.5px;
        }

        /* ── PANEL DERECHO (form) ── */
        .panel-form {
            width: 420px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 40px;
            background: rgba(15, 25, 50, 0.85);
            border-left: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(24px);
            box-shadow: -8px 0 40px rgba(0,0,0,0.4);
        }

        .form-inner {
            width: 100%;
        }

        .form-header {
            margin-bottom: 28px;
        }

        .form-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .form-header p {
            font-size: 13px;
            color: #7a90aa;
        }

        /* Campos */
        .field-group {
            margin-bottom: 14px;
        }

        .field-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #6d9acc;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .field-wrap {
            position: relative;
        }

        .field-wrap i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #2d5a8a;
            font-size: 15px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .field-wrap input,
        .field-wrap select {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 13px 16px 13px 44px;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .field-wrap input::placeholder { color: #4a6a8a; }

        .field-wrap select option {
            background: #0d1b35;
            color: #fff;
        }

        .field-wrap input:focus,
        .field-wrap select:focus {
            border-color: #2563eb;
            background: rgba(37,99,235,0.06);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }

        .field-wrap:focus-within i {
            color: #4d9fff;
        }

        /* Toggle password */
        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #2d5a8a;
            cursor: pointer;
            font-size: 15px;
            padding: 4px;
            transition: color 0.2s;
        }
        .toggle-pass:hover { color: #4d9fff; }

        /* Opciones */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 4px 0 20px;
        }

        .check-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #7a90aa;
            cursor: pointer;
            user-select: none;
        }

        .check-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #2563eb;
            cursor: pointer;
        }

        /* Botón */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1e5fd4, #2563eb);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(37,99,235,0.4);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 32px rgba(37,99,235,0.55);
        }

        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:active { transform: translateY(0); }

        .btn-submit .btn-icon {
            margin-left: 8px;
            transition: transform 0.2s;
        }

        .btn-submit:hover .btn-icon {
            transform: translateX(4px);
        }

        /* Separador */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: #1e3050;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }

        /* Footer del form */
        .form-footer {
            text-align: center;
            margin-top: 16px;
        }

        .form-footer p {
            font-size: 12px;
            color: #4a6a8a;
        }

        /* Indicador de seguridad */
        .security-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(37,99,235,0.08);
            border: 1px solid rgba(37,99,235,0.15);
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 16px;
        }

        .security-badge i {
            color: #4d9fff;
            font-size: 14px;
        }

        .security-badge span {
            font-size: 12px;
            color: #4d7aaa;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .panel-info { display: none; }
            .layout { grid-template-columns: 1fr; }
            .panel-form {
                width: 100%;
                border-left: none;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animated">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="layout">

        <!-- Panel izquierdo -->
        <div class="panel-info">

            <div class="panel-top">
                <div class="brand">
                    <img src="/TICKETUCAD/media/img/logo.png" alt="Logo" class="brand-logo">
                    <div class="brand-text">
                        <div class="brand-name">TICKET UCAD</div>
                        <div class="brand-sub">Soporte IT</div>
                    </div>
                </div>

                <h1 class="info-headline">
                    Gestión avanzada y <br>resolución de incidentes<br><span>en tiempo real.</span>
                </h1>

                

                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-num">99%</span>
                        <span class="stat-label">Resolución</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-num">24/5</span>
                        <span class="stat-label">Disponible</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-num">+500</span>
                        <span class="stat-label">Tickets</span>
                    </div>
                </div>
            </div>

            <div class="video-banner">
                <video autoplay muted loop playsinline>
                    <source src="/TICKETUCAD/media/video/vid1.mp4" type="video/mp4">
                </video>
                <div class="video-banner-overlay"></div>
                <div class="video-banner-label">
                    <div class="dot"></div>
                    <span>Sistema activo en tiempo real</span>
                </div>
            </div>

        </div>

        <!-- Panel derecho (formulario) -->
        <div class="panel-form">
            <div class="form-inner">

                

                <form id="loginForm" action="#" method="post">

    

                    <div class="field-group">
                        <label class="field-label" for="rol">Rol</label>
                        <div class="field-wrap">
                            <i class="bi bi-shield-fill"></i>
                            <select id="rol" name="rol" required>
                                <option value="" disabled selected>Selecciona tu rol</option>
                                <option value="agente_it">Agente IT</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>
                    </div>

                    <div class="field-group">
                        <label class="field-label" for="usuario">Usuario</label>
                        <div class="field-wrap">
                            <i class="bi bi-person-fill"></i>
                            <input type="text" id="usuario" name="usuario" placeholder="Tu nombre de usuario" required>
                        </div>
                    </div>

                    <div class="field-group">
                        <label class="field-label" for="password">Contraseña</label>
                        <div class="field-wrap">
                            <i class="bi bi-lock-fill"></i>
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="check-label">
                            <input type="checkbox" id="showPass"> Ver contraseña
                        </label>
                    </div>

                    <button type="submit" class="btn-submit">
                        Iniciar sesión <i class="bi bi-arrow-right btn-icon"></i>
                    </button>

                </form>

                <div class="form-footer">
                    <p>&copy; 2026 Ticket UCAD. Todos los derechos reservados.</p>
                </div>

            </div>
        </div>

    </div>

    <script>
        // URL amigable
        if (window.location.pathname !== '/TICKETUCAD/inicio-sesion') {
            window.history.replaceState(null, 'Inicio de Sesión', '/TICKETUCAD/inicio-sesion');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/TICKETUCAD/app/controllers/login/login.js"></script>
</body>
</html>
